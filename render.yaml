services:
  - type: web
    name: coeff-manager
    runtime: node
    buildCommand: npm install && cd backend && npm install && cd ../frontend && npm install && npm run build && cd ..
    startCommand: node --max-old-space-size=512 backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
      - key: DATABASE_URL
        fromDatabase:
          name: coeff-manager-db
          property: connectionString

databases:
  - name: coeff-manager-db
    databaseName: coeffmanager
    plan: free
