services:
  - type: web
    name: coeff-manager
    runtime: node
    buildCommand: npm install && cd frontend && npm install && npm run build && cd ..
    startCommand: node --max-old-space-size=512 backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
